    <h1>Session Lock</h1>
    <p>A Session Lock occurs when one database session locks a row or table during a transaction , preventing other sessions from 
        modifying the same data until the transaction is committed or rolled back. </p>
    <p>Oracle uses row-level locking to maintain the data consistency </p>
